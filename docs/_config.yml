title: "🍳 Pan Out"
description: AI-powered cooking skills for Claude Code
theme: just-the-docs
remote_theme: just-the-docs/just-the-docs

url: https://panout.org
baseurl: ""

color_scheme: light

search_enabled: true
search.heading_level: 3

nav_external_links:
  - title: GitHub
    url: https://github.com/alexeyv/pan-out

back_to_top: true
back_to_top_text: "Back to top"


gh_edit_link: false

callouts:
  purple:
    title: ""
    color: purple
  yellow:
    title: ""
    color: yellow
  blue:
    title: ""
    color: blue


plugins:
  - jekyll-sitemap

exclude:
  - README.md
  - CONTRIBUTING.md
  - LICENSE
  - Gemfile
  - Gemfile.lock
  - vendor
